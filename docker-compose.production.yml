services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "5001:5001"
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - VITE_TRUSON_API_URL=${VITE_TRUSON_API_URL}
        - VITE_COINGECKO_API_URL=${VITE_COINGECKO_API_URL}
        - VITE_CURRENCY_API_URL=${VITE_CURRENCY_API_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_WORK_EMAIL=${VITE_WORK_EMAIL}
        - VITE_BLOG_ADMIN=${VITE_BLOG_ADMIN}
    depends_on:
      - server
    ports:
      - "80:80"
    restart: unless-stopped