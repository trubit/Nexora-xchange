    <script>
      (function () {
        try {
          var defaultGoogTrans = "/en/en";
          document.cookie = "googtrans=" + defaultGoogTrans + "; path=/; SameSite=Lax";

          var host = window.location.hostname || "";
          if (host && host !== "localhost" && host !== "127.0.0.1" && host !== "0.0.0.0") {
            var baseDomain = host.indexOf("www.") === 0 ? host.slice(4) : host;
            document.cookie =
              "googtrans=" +
              defaultGoogTrans +
              "; path=/; domain=." +
              baseDomain +
              "; SameSite=Lax";
          }

          window.localStorage.setItem("language", "en");
        } catch (_error) {
          // Ignore: preserve app boot even if storage/cookie access fails.
        }
      })();
