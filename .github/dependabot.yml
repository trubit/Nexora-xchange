version: 2

updates:
  # ── npm packages ─────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    # Group all dev-dependency patch/minor bumps into one PR to reduce noise
    groups:
      dev-deps-minor:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-deps-patch:
        dependency-type: production
        update-types:
          - patch
    # Skip major bumps; review those manually
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"
