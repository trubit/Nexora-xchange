name: CI

on:
  push:
    branches: [main, dev, "feature/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Test & Coverage ───────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: vitest-test-jwt-secret-minimum-32-chars!!
          JWT_EXPIRES_IN: 1h
          SUPPORT_EMAIL: support@test.example.com
          REDIS_ENABLED: "false"
          LOG_LEVEL: silent

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Post coverage summary on PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          name: Nexora (frontend + server)
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  # ── 3. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite production build
        run: npm run build
        env:
          VITE_COINGECKO_API_URL: https://api.coingecko.com/api/v3
          VITE_CURRENCY_API_URL: https://api.frankfurter.dev/v1
          VITE_BLOG_ADMIN: "true"
          VITE_TRUSON_API_URL: https://api.nexora.com
          VITE_GOOGLE_CLIENT_ID: "ci-build-placeholder"
          VITE_WORK_EMAIL: contact@nexora.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ── 4. E2E Tests ─────────────────────────────────────────────────────────────
  # Only runs on PRs to main and pushes to main/dev to conserve CI minutes.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && contains(fromJson('["main","dev"]'), github.ref_name))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browsers between runs (~300 MB per browser)
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          VITE_COINGECKO_API_URL: https://api.coingecko.com/api/v3
          VITE_CURRENCY_API_URL: https://api.frankfurter.dev/v1
          VITE_TRUSON_API_URL: https://api.nexora.com
          VITE_GOOGLE_CLIENT_ID: "ci-build-placeholder"
          VITE_WORK_EMAIL: contact@nexora.com

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces & screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            test-results/
          retention-days: 7
